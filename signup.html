<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Velocis Redis Caching</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="position-absolute top-0 start-0 w-100 p-3 p-md-4 d-flex justify-content-end align-items-center"
        style="z-index: 1000;">
        <div class="d-flex gap-2">
            <button id="theme-toggle" title="Toggle Theme">
                <i class="fas fa-moon"></i>
            </button>
            <button id="rtl-toggle" class="btn btn-outline-secondary btn-sm">RTL</button>
        </div>
    </div>
    <div class="hero-section auth-page min-vh-100 d-flex align-items-center" style="background-image: linear-gradient(135deg, rgba(0, 97, 255, 0.1), rgba(96, 239, 255, 0.1)), url('assets/home_hero.jpg'); background-size: cover; background-position: center;">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-6">
                    <div class="glass-card shadow-lg animate-fade-up">
                        <div class="text-center mb-4">
                            <a href="index.html" class="d-inline-block mb-4">
                                <img src="assets/logo.png" alt="Velocis Logo" height="40">
                            </a>
                            <h2 class="fw-bold">Create Your Account</h2>
                            <p class="text-muted">Join the elite engineering teams using Velocis</p>
                        </div>

                        <form>
                            <div class="row g-2">
                                <div class="col-12">
                                    <label class="form-label small text-muted">First Name</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-transparent border-end-0"><i
                                                class="fas fa-user text-muted"></i></span>
                                        <input type="text" class="form-control border-start-0 ps-0" placeholder="Jane"
                                            required>
                                    </div>
                                </div>
                                <div class="col-12">
                                    <label class="form-label small text-muted">Last Name</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-transparent border-end-0"><i
                                                class="fas fa-user text-muted"></i></span>
                                        <input type="text" class="form-control border-start-0 ps-0" placeholder="Doe"
                                            required>
                                    </div>
                                </div>
                                <div class="col-12">
                                    <label class="form-label small text-muted">Work Email</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-transparent border-end-0"><i
                                                class="fas fa-envelope text-muted"></i></span>
                                        <input type="email" class="form-control border-start-0 ps-0"
                                            placeholder="jane@company.com" required>
                                    </div>
                                </div>
                                <div class="col-12">
                                    <label class="form-label small text-muted">Company Name</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-transparent border-end-0"><i
                                                class="fas fa-building text-muted"></i></span>
                                        <input type="text" class="form-control border-start-0 ps-0"
                                            placeholder="Acme Inc." required>
                                    </div>
                                </div>
                                <div class="col-12">
                                    <label class="form-label small text-muted">Password</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-transparent border-end-0"><i
                                                class="fas fa-lock text-muted"></i></span>
                                        <input type="password" class="form-control border-start-0 border-end-0 ps-0"
                                            id="password" placeholder="At least 8 characters" required>
                                        <span
                                            class="input-group-text bg-transparent border-start-0 cursor-pointer toggle-password"
                                            data-target="password">
                                            <i class="fas fa-eye text-muted"></i>
                                        </span>
                                    </div>
                                </div>
                                <div class="col-12">
                                    <label class="form-label small text-muted">Confirm Password</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-transparent border-end-0"><i
                                                class="fas fa-lock text-muted"></i></span>
                                        <input type="password" class="form-control border-start-0 border-end-0 ps-0"
                                            id="confirm-password" placeholder="••••••••" required>
                                        <span
                                            class="input-group-text bg-transparent border-start-0 cursor-pointer toggle-password"
                                            data-target="confirm-password">
                                            <i class="fas fa-eye text-muted"></i>
                                        </span>
                                    </div>
                                </div>
                                <div class="col-12 mt-3">
                                    <div class="form-check mb-3">
                                        <input type="checkbox" class="form-check-input" id="terms" required>
                                        <label class="form-check-label small text-muted" for="terms">
                                            I agree to the <a href="#" class="text-primary text-decoration-none">Terms
                                                of Service</a> and <a href="#"
                                                class="text-primary text-decoration-none">Privacy Policy</a>
                                        </label>
                                    </div>
                                    <button type="submit" class="btn btn-premium w-100 py-3 mb-3">Create
                                        Account</button>
                                </div>

                                <div class="text-center">
                                    <p class="small text-muted mb-3">Or sign up with</p>
                                    <div class="d-flex flex-column flex-sm-row gap-2 justify-content-center">
                                        <button type="button"
                                            class="btn btn-outline-secondary rounded-pill px-4 py-2"><i
                                                class="fab fa-google me-2 text-danger"></i>Google</button>
                                        <button type="button"
                                            class="btn btn-outline-secondary rounded-pill px-4 py-2"><i
                                                class="fab fa-apple me-2 text-dark"></i>Apple</button>
                                    </div>
                                </div>
                            </div>
                        </form>

                        <div class="text-center mt-4">
                            <p class="small text-muted">Already have an account? <a href="login.html"
                                    class="text-primary text-decoration-none fw-bold">Sign in</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>

</html>
